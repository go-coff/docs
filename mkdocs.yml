site_name: go-coff
site_description: Pure-Go PE/COFF tooling for UEFI — link relocatable objects (or a PIE) into PE32+/EFI, assemble UKIs, emit bare-metal images, and compress EFI binaries. No binutils, no LLD, no cgo.
site_url: https://go-coff.github.io/docs/
repo_url: https://github.com/go-coff
repo_name: go-coff
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Light mode }
  features: [navigation.sections, navigation.top, content.code.copy, search.suggest]

extra_css: [stylesheets/brand.css]
extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Home: index.md
  - Components:
      - Overview: components/index.md
      - "peln — PE/COFF library": components/peln.md
      - "pectl — reference CLI": components/pectl.md
      - "efipack — self-extracting EFI": components/efipack.md
